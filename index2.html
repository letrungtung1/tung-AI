
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile - Lê Trung Tùng</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 5px solid #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .position {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .company {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .facebook {
            background: #1877f2;
            color: white;
        }

        .facebook:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.4);
        }

        .zalo {
            background: #0084ff;
            color: white;
        }

        .zalo:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 132, 255, 0.4);
        }

        .linkedin {
            background: #0a66c2;
            color: white;
        }

        .linkedin:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(10, 102, 194, 0.4);
        }

        .gift-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
            width: 100%;
            margin-top: 20px;
        }

        .gift-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.6);
        }

        .gift-btn:active {
            transform: translateY(-1px);
        }

        .game-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
            width: 100%;
            margin-top: 15px;
        }

        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.6);
        }

        .game-btn:active {
            transform: translateY(-1px);
        }

        /* Message Button & Chat Modal Styles */
        .message-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .message-btn:active {
            transform: scale(0.95);
        }

        .chat-modal {
            display: none;
            position: fixed;
            bottom: 120px;
            left: 30px;
            width: 350px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
            max-height: 500px;
            overflow: hidden;
            flex-direction: column;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-modal.active {
            display: flex;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-body {
            padding: 15px;
            overflow-y: auto;
            max-height: 300px;
        }

        .chat-footer {
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .chat-footer input,
        .chat-footer textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .chat-footer textarea {
            min-height: 70px;
            resize: vertical;
        }

        .chat-send-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .message-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .message-item strong {
            color: #333;
            display: block;
            margin-bottom: 3px;
        }

        .message-item p {
            color: #666;
            font-size: 13px;
            margin: 5px 0;
        }

        .message-item small {
            color: #999;
            font-size: 11px;
        }

        /* Flappy Bird Game Styles */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
        }

        .overlay.active {
            display: block;
        }

        .game-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
            overflow: hidden;
        }

        .game-modal.active {
            display: block;
        }

        .game-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .game-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-content {
            padding: 20px;
            text-align: center;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 3px solid #667eea;
            border-radius: 10px;
            margin: 0 auto;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
        }

        .game-stats {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        .game-instructions {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://scontent.fhan5-2.fna.fbcdn.net/v/t39.30808-6/474147403_1913023212561170_7789277527733579873_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=WDBURiDGy_8Q7kNvwHzqiOQ&_nc_oc=AdqStszSpNfJ7T-GMSxx4-aytsgHKx9uRClG1nYHl9q9DsiiJvEMEmgg4ZtxHo3vykU&_nc_zt=23&_nc_ht=scontent.fhan5-2.fna&_nc_gid=4I5owNnW2nBtRhCQqmsEtw&_nc_ss=7a3a8&oh=00_Af0LCJ6JJA6D_zIJlGFS_zERs5FUp12O2B9idRO8d19KRQ&oe=69E3EA7E" alt="Avatar" class="avatar">
        
        <h1>Lê Trung Tùng</h1>
        <p class="position">Giám Đốc Dự Án</p>
        <p class="company">Công ty Homi Hulk</p>

        <div class="social-links">
            <a href="https://www.facebook.com/Trungtung.09.11" target="_blank" class="social-btn facebook" title="Facebook">f</a>
            <a href="https://drive.google.com/file/d/1rdec2kRIAGsvuWe4Onuh6TmbtQZVf6nH/view?usp=sharing" target="_blank" class="social-btn zalo" title="Zalo">Z</a>
            <a href="https://drive.google.com/file/d/1rdec2kRIAGsvuWe4Onuh6TmbtQZVf6nH/view?usp=sharing" target="_blank" class="social-btn linkedin" title="LinkedIn">in</a>
        </div>

        <button class="gift-btn" onclick="celebrateGift()">🎁 Tặng Quà</button>
        <button class="game-btn" onclick="openGame()">🎮 Chơi Flappy Bird</button>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeGame()"></div>

    <!-- Flappy Bird Game Modal -->
    <div class="game-modal" id="gameModal">
        <div class="game-header">
            <span>🎮 Flappy Bird</span>
            <button class="game-close" onclick="closeGame()">✕</button>
        </div>
        <div class="game-content">
            <canvas id="gameCanvas" width="400" height="500"></canvas>
            <div class="game-stats">Điểm: <span id="gameScore">0</span></div>
            <div class="game-instructions">
                🖱️ Click hoặc nhấn SPACE để bay<br>
                ⚠️ Tránh va chạm với các ống nước
            </div>
        </div>
    </div>

    <!-- Message Floating Button -->
    <button class="message-btn" onclick="toggleChat()">💬</button>

    <!-- Chat Modal -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-header">
            <span>Để lại lời nhắn</span>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-body" id="messagesList"></div>
        <div class="chat-footer">
            <input type="text" id="senderName" placeholder="Tên của bạn" maxlength="50">
            <textarea id="messageText" placeholder="Lời nhắn của bạn..."></textarea>
            <button class="chat-send-btn" onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        // ============ CHAT FUNCTIONALITY ============
        let messages = JSON.parse(localStorage.getItem('messages')) || [];

        function toggleChat() {
            const chatModal = document.getElementById('chatModal');
            chatModal.classList.toggle('active');
            if (chatModal.classList.contains('active')) {
                document.getElementById('senderName').focus();
            }
        }

        function sendMessage() {
            const name = document.getElementById('senderName').value.trim();
            const message = document.getElementById('messageText').value.trim();
            
            if (!name || !message) {
                alert('Vui lòng điền đầy đủ tên và lời nhắn');
                return;
            }
            
            messages.push({ 
                name, 
                message, 
                time: new Date().toLocaleString('vi-VN') 
            });
            localStorage.setItem('messages', JSON.stringify(messages));
            
            document.getElementById('senderName').value = '';
            document.getElementById('messageText').value = '';
            
            displayMessages();
            document.getElementById('messagesList').scrollTop = document.getElementById('messagesList').scrollHeight;
        }
        
        function displayMessages() {
            const list = document.getElementById('messagesList');
            if (messages.length === 0) {
                list.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">Chưa có lời nhắn nào</p>';
                return;
            }
            list.innerHTML = messages.map((msg, i) => `
                <div class="message-item">
                    <strong>${msg.name}</strong>
                    <p>${msg.message}</p>
                    <small>${msg.time}</small>
                </div>
            `).join('');
        }
        
        function celebrateGift() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        // Display messages on load
        displayMessages();

        // Close chat when pressing Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('chatModal').classList.remove('active');
            }
        });

        // Send message with Enter key
        document.getElementById('messageText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                sendMessage();
            }
        });

        // ============ FLAPPY BIRD GAME ============
        let gameRunning = false;
        let gameScore = 0;
        let gameLoopId = null;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const bird = {
            x: 50,
            y: canvas.height / 2,
            width: 30,
            height: 25,
            gravity: 0.6,
            lift: -12,
            velocity: 0
        };

        let pipes = [];
        const pipeWidth = 60;
        const pipeGap = 130;
        const pipeDistance = 200;

        function openGame() {
            document.getElementById('gameModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            resetGame();
            startGameLoop();
        }

        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            gameRunning = false;
            if (gameLoopId) {
                cancelAnimationFrame(gameLoopId);
            }
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes = [{ x: canvas.width, topHeight: Math.random() * (canvas.height - pipeGap - 100) + 50 }];
            gameScore = 0;
            gameRunning = true;
            document.getElementById('gameScore').textContent = gameScore;
        }

        function handleJump() {
            if (gameRunning) {
                bird.velocity = bird.lift;
            }
        }

        canvas.addEventListener('click', handleJump);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                e.preventDefault();
                handleJump();
            }
        });

        function updateGame() {
            if (!gameRunning) return;

            // Update bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Check ground collision
            if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
                endGame();
                return;
            }

            // Update pipes
            pipes.forEach(pipe => pipe.x -= 5);

            // Add new pipe
            if (pipes[pipes.length - 1].x < canvas.width - pipeDistance) {
                pipes.push({
                    x: canvas.width,
                    topHeight: Math.random() * (canvas.height - pipeGap - 100) + 50
                });
            }

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x > -pipeWidth);

            // Check pipe collisions and scoring
            pipes.forEach(pipe => {
                const bottomHeight = canvas.height - pipe.topHeight - pipeGap;

                // Check scoring
                if (pipe.x + pipeWidth === bird.x) {
                    gameScore++;
                    document.getElementById('gameScore').textContent = gameScore;
                }

                // Check collision
                if (bird.x < pipe.x + pipeWidth &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.topHeight + pipeGap)) {
                    endGame();
                }
            });
        }

        function drawGame() {
            // Clear canvas with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bird
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(bird.x + bird.width / 2, bird.y + bird.height / 2, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw bird eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width - 10, bird.y + 8, 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw pipes
            ctx.fillStyle = '#27ae60';
            pipes.forEach(pipe => {
                const bottomHeight = canvas.height - pipe.topHeight - pipeGap;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, bottomHeight);

                // Pipe borders
                ctx.strokeStyle = '#229954';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, bottomHeight);
            });

            // Draw ground
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
        }

        function endGame() {
            gameRunning = false;
            setTimeout(() => {
                alert(`Game Over!\nĐiểm của bạn: ${gameScore} điểm`);
                openGame();
            }, 100);
        }

        function startGameLoop() {
            function loop() {
                updateGame();
                drawGame();
                if (document.getElementById('gameModal').classList.contains('active')) {
                    gameLoopId = requestAnimationFrame(loop);
                }
            }
            gameLoopId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
